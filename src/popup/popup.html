<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Context Clipboard</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body data-theme="auto">
    <header>
      <div class="search-row">
        <input id="search" type="search" placeholder="Search · text, kind:image, host:github.com, tag:code, is:pinned, after:24h" autocomplete="off" />
        <button id="note-btn" class="icon-btn" title="Add note" data-icon="plus"></button>
        <button id="settings-btn" class="icon-btn" title="Settings" data-icon="settings"></button>
      </div>
      <div class="filters">
        <button data-kind="all" class="active" title="All clips">
          <span class="filter-icon" data-icon="all"></span>
          <span class="filter-label">All</span>
        </button>
        <button data-kind="text" title="Text only" data-icon="text"></button>
        <button data-kind="image" title="Images only" data-icon="image"></button>
        <button data-kind="link" title="Links only" data-icon="link"></button>
        <button id="pinned-toggle" title="Pinned only" data-icon="pin"></button>
      </div>
      <div id="quick-chips" class="quick-chips"></div>
      <div id="tag-chips" class="tag-chips" hidden></div>
    </header>

    <main id="list" tabindex="0"></main>

    <div id="drop-zone" class="drop-zone" hidden>
      <div>Drop image to capture</div>
    </div>

    <section id="detail" hidden>
      <div class="detail-header">
        <button id="detail-back" class="icon-btn" title="Back" data-icon="back"></button>
        <span class="detail-title">Clip</span>
        <button id="detail-ocr" class="icon-btn" title="OCR text from image" data-icon="eye" hidden></button>
        <button id="detail-redact" class="icon-btn" title="Redact emails / phones / secrets in this clip" data-icon="shield"></button>
        <button id="detail-pin" class="icon-btn" title="Pin" data-icon="pin"></button>
        <button id="detail-delete" class="icon-btn" title="Delete" data-icon="trash"></button>
      </div>
      <div id="detail-body" class="detail-body"></div>
      <div class="detail-meta">
        <div class="meta-row"><strong>Source</strong> <a id="detail-url" href="#" target="_blank"></a></div>
        <div class="meta-row"><strong>Captured</strong> <span id="detail-time"></span></div>
        <div class="meta-row"><strong>Copies</strong> <span id="detail-hits"></span></div>
        <div class="meta-row">
          <strong>Tags</strong>
          <input id="detail-tags" type="text" placeholder="comma,separated,tags" />
        </div>
        <div class="meta-row" id="detail-nearby-row">
          <strong>Context</strong>
          <div id="detail-nearby" class="nearby"></div>
        </div>
        <div class="meta-row" id="detail-image-row" hidden>
          <strong>Image</strong>
          <span id="detail-image-info"></span>
        </div>
        <div class="meta-row" id="detail-ocr-row" hidden>
          <strong>OCR text</strong>
          <div id="detail-ocr-text" class="nearby"></div>
        </div>
      </div>
      <div class="detail-actions">
        <button id="detail-copy">Copy</button>
        <button id="detail-copy-md">Copy as Markdown</button>
      </div>
    </section>

    <section id="settings-panel" hidden>
      <div class="detail-header">
        <button id="settings-back" class="icon-btn" title="Back" data-icon="back"></button>
        <span class="detail-title">Settings</span>
      </div>
      <div class="settings-body">
        <label class="setting">
          <span>Max unpinned items</span>
          <input id="s-max" type="number" min="50" max="10000" step="50" />
        </label>
        <label class="setting">
          <span>Dedup window (seconds)</span>
          <input id="s-dedup" type="number" min="0" max="3600" step="5" />
        </label>
        <label class="setting toggle">
          <span>Capture Cmd/Ctrl+C events</span>
          <input id="s-capture" type="checkbox" />
        </label>
        <label class="setting toggle">
          <span>Capture images on copy</span>
          <input id="s-capture-img" type="checkbox" />
        </label>
        <label class="setting toggle">
          <span>Auto-tag clips</span>
          <input id="s-autotag" type="checkbox" />
        </label>
        <label class="setting toggle">
          <span>Auto-OCR new image clips</span>
          <input id="s-ocr" type="checkbox" />
        </label>
        <label class="setting toggle">
          <span>In-page palette (Cmd+Shift+V overlay)</span>
          <input id="s-palette" type="checkbox" />
        </label>
        <label class="setting toggle">
          <span>Smart field suggestions (auto-fill chip)</span>
          <input id="s-fields" type="checkbox" />
        </label>
        <label class="setting toggle">
          <span>Auto-redact PII in captured text (emails / phones / cards / secrets) — one-way</span>
          <input id="s-autoredact" type="checkbox" />
        </label>
        <label class="setting toggle">
          <span>Open in side panel (Chrome) instead of popup</span>
          <input id="s-sidepanel" type="checkbox" />
        </label>
        <label class="setting">
          <span>Block list (one host per line)</span>
          <textarea id="s-block" rows="3" placeholder="bank.com&#10;mail.google.com"></textarea>
        </label>
        <label class="setting">
          <span>Allow list (if set, only these capture)</span>
          <textarea id="s-allow" rows="3" placeholder="github.com&#10;stackoverflow.com"></textarea>
        </label>
        <label class="setting">
          <span>Theme</span>
          <select id="s-theme">
            <option value="auto">Auto</option>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </label>
        <div id="storage-info" class="storage-info"></div>
        <label class="setting toggle" id="encrypt-toggle-row">
          <span>Encrypt export with passphrase (JSON only)</span>
          <input id="s-encrypt-export" type="checkbox" />
        </label>
        <label class="setting" id="encrypt-pass-row" hidden>
          <span>Export passphrase</span>
          <input id="export-pass" type="password" autocomplete="new-password" placeholder="min 4 chars — you'll need this to restore" />
        </label>
        <label class="setting">
          <span>Export format</span>
          <select id="export-format">
            <option value="json">JSON (round-trippable)</option>
            <option value="markdown">Markdown (human-readable)</option>
            <option value="csv">CSV (spreadsheet)</option>
          </select>
        </label>
        <div class="trash-section" id="trash-section">
          <div class="trash-header">
            <span class="trash-title">Trash</span>
            <span class="trash-summary" id="trash-summary">empty</span>
            <button id="trash-empty" class="danger small" title="Permanently delete all trashed clips">Empty</button>
          </div>
          <div class="trash-list" id="trash-list"></div>
          <div class="trash-foot">Deleted clips live here for 7 days, then disappear forever.</div>
        </div>
        <div class="settings-actions">
          <button id="export-btn">Export</button>
          <button id="import-btn">Import JSON</button>
          <button id="clear-all-btn" class="danger">Delete everything</button>
        </div>
        <input id="import-file" type="file" accept="application/json" hidden />
        <div class="settings-foot">
          <span>Context Clipboard · v0.6.2</span>
        </div>
      </div>
    </section>

    <footer>
      <span id="count"></span>
      <span class="hint">Shift+Click MD · ⌘/Ctrl+Click select · ↑↓ ⏎ / · X select</span>
      <button id="clear">Clear unpinned</button>
    </footer>

    <div id="bulk-bar" class="bulk-bar" hidden>
      <span id="bulk-count">0 selected</span>
      <button id="bulk-pin" title="Toggle pin on selection" data-icon="pin"></button>
      <button id="bulk-tag" title="Add tag to selection" data-icon="tag"></button>
      <button id="bulk-del" class="danger" title="Delete selection" data-icon="trash"></button>
      <button id="bulk-clear" title="Clear selection (Esc)" data-icon="close"></button>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
